<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSBIT | Clothing Shop POS</title>
    <!-- SEO -->
    <meta name="description" content="Professional POS system for clothing shops. Manage inventory, billing, and sales with ease.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- JsBarcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <!-- Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#64748b',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-500 rounded-lg flex items-center justify-center">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">POSBIT</h1>
        </div>
        
        <nav class="mt-6 px-4 space-y-2">
            <a href="#" onclick="Router.navigate('dashboard')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="dashboard">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-400"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" onclick="Router.navigate('billing')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="billing">
                <i data-lucide="calculator" class="w-5 h-5 text-indigo-400"></i>
                <span>Billing</span>
            </a>
            <a href="#" onclick="Router.navigate('products')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="products">
                <i data-lucide="package" class="w-5 h-5 text-indigo-400"></i>
                <span>Products</span>
            </a>
            <a href="#" onclick="Router.navigate('sales')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="sales">
                <i data-lucide="history" class="w-5 h-5 text-indigo-400"></i>
                <span>Sales</span>
            </a>
            <a href="#" onclick="Router.navigate('reports')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="reports">
                <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-400"></i>
                <span>Reports</span>
            </a>
            <a href="#" onclick="Router.navigate('settings')" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-white/10" data-page="settings">
                <i data-lucide="settings" class="w-5 h-5 text-indigo-400"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="absolute bottom-8 px-8 w-full">
            <div onclick="UI.logout()" class="pt-4 border-t border-white/10 flex items-center gap-3 text-slate-400 hover:text-white cursor-pointer transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Logout</span>
            </div>
        </div>
    </aside>

    <!-- Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="UI.toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="lg:ml-64 min-h-screen transition-all duration-300">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 flex items-center justify-between p-4 lg:p-6 glass mb-6 mt-2 mx-4 rounded-2xl premium-shadow">
            <div class="flex items-center gap-4">
                <button onclick="UI.toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 rounded-xl transition-colors">
                    <i data-lucide="menu" class="w-6 h-6 text-slate-700"></i>
                </button>
                <div id="page-title-container">
                    <h2 id="page-title" class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight">Dashboard</h2>
                    <p id="page-subtitle" class="text-slate-400 text-xs font-bold uppercase tracking-widest hidden sm:block">Control Center</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <span id="shop-name-display" class="font-bold text-sm text-indigo-600">POSBIT Store</span>
                    <span id="date-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter italic">Loading...</span>
                </div>
                <div class="w-10 h-10 rounded-xl bg-indigo-600 shadow-lg shadow-indigo-200 flex items-center justify-center text-white font-black">
                    A
                </div>
            </div>
        </header>

        <!-- View Container -->
        <div id="view-container" class="px-4 lg:px-8 pb-12 animate-fade-in">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <!-- Receipt Print Area (Invisible on screen) -->
    <div id="receipt-print-area">
        <!-- Receipt Content Injected Here -->
    </div>

    <!-- Modals Container -->
    <div id="modal-container" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0">
            <!-- Modal body injected here -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="db.js"></script>
    <script src="script.js"></script>
    <script>
        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            Router.init();
            
            // Update time
            setInterval(() => {
                const now = new Date();
                document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { 
                    month: 'long', 
                    day: 'numeric', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }, 1000);
        });
    </script>
</body>
</html>
